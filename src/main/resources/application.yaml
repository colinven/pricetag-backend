spring:
  application:
    name: pricetag_backend
  datasource:
    url: jdbc:postgresql://localhost:5432/pricetag
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
  properties:
    hibernate:
      format_sql: true
  database: postgresql
  hibernate:
    ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history
    baseline-on-migrate: true
pricing:
  baseSqftPrice: 0.11
  storyMultiplier: 0.03
  minimumCharge: 250
  priceRangeBuffer: 50
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
keys:
  googleMapsKey: ${GOOGLE_MAPS_API_KEY}